<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EG AI — Lead Test Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0a0a0a; color: #e8e8e0; font-family: 'DM Sans', sans-serif; min-height: 100vh; }
  .panel { max-width: 560px; margin: 0 auto; padding: 48px 24px 80px; }
  .logo-row { display: flex; align-items: center; gap: 10px; margin-bottom: 48px; }
  .logo-mark { width: 32px; height: 32px; border: 1.5px solid #4ade80; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700; color: #4ade80; letter-spacing: 0.05em; }
  .logo-text { font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 600; color: #e8e8e0; letter-spacing: 0.08em; text-transform: uppercase; }
  .badge { display: inline-flex; align-items: center; gap: 6px; background: rgba(74,222,128,0.08); border: 0.5px solid rgba(74,222,128,0.25); border-radius: 4px; padding: 5px 10px; font-size: 11px; font-weight: 500; color: #4ade80; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 20px; }
  .badge-dot { width: 5px; height: 5px; background: #4ade80; border-radius: 50%; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  h1 { font-family: 'Syne', sans-serif; font-size: 28px; font-weight: 700; color: #f0f0e8; margin-bottom: 8px; letter-spacing: -0.02em; }
  .subtitle { font-size: 14px; color: #555; margin-bottom: 40px; line-height: 1.6; }
  .section-label { font-size: 10px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: #444; margin-bottom: 14px; }
  .card { background: #111; border: 0.5px solid #1e1e1e; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  .field { display: flex; flex-direction: column; gap: 6px; }
  .field label { font-size: 11px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: #555; }
  .field input { background: #0d0d0d; border: 0.5px solid #252525; border-radius: 8px; padding: 10px 14px; font-family: 'DM Sans', sans-serif; font-size: 14px; color: #e8e8e0; outline: none; transition: border-color 0.15s; width: 100%; }
  .field input:focus { border-color: #4ade80; }
  .field input::placeholder { color: #2e2e2e; }
  .campaigns-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .campaign-btn { background: #0d0d0d; border: 0.5px solid #252525; border-radius: 8px; padding: 11px 14px; font-family: 'DM Sans', sans-serif; font-size: 13px; color: #666; cursor: pointer; text-align: left; transition: all 0.15s; display: flex; align-items: center; gap: 8px; width: 100%; }
  .campaign-btn:hover { border-color: #2e2e2e; color: #999; }
  .campaign-btn.selected { border-color: #4ade80; color: #4ade80; background: rgba(74,222,128,0.05); }
  .campaign-dot { width: 6px; height: 6px; border-radius: 50%; border: 1.5px solid currentColor; flex-shrink: 0; transition: background 0.15s; }
  .campaign-btn.selected .campaign-dot { background: #4ade80; }
  .campaign-tag { margin-left: auto; font-size: 10px; letter-spacing: 0.06em; opacity: 0.5; font-weight: 500; }
  .selected-display { margin-top: 12px; padding: 10px 14px; background: rgba(74,222,128,0.04); border: 0.5px solid rgba(74,222,128,0.15); border-radius: 8px; font-size: 12px; color: #4ade80; display: none; align-items: center; gap: 8px; }
  .selected-display.visible { display: flex; }
  .selected-display span { color: #555; font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase; }
  .submit-btn { width: 100%; background: #4ade80; border: none; border-radius: 10px; padding: 15px; font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 600; letter-spacing: 0.04em; color: #0a0a0a; cursor: pointer; transition: all 0.15s; margin-bottom: 10px; }
  .submit-btn:hover { background: #6ee7a0; }
  .submit-btn:active { transform: scale(0.99); }
  .submit-btn:disabled { background: #1a2e20; color: #2a4a30; cursor: not-allowed; transform: none; }
  .divider { display: flex; align-items: center; gap: 12px; margin: 8px 0; }
  .divider-line { flex: 1; height: 0.5px; background: #1e1e1e; }
  .divider-text { font-size: 11px; color: #333; letter-spacing: 0.08em; text-transform: uppercase; }
  .delete-row { display: flex; gap: 8px; margin-bottom: 10px; }
  .delete-input { flex: 1; background: #0d0d0d; border: 0.5px solid #252525; border-radius: 8px; padding: 10px 14px; font-family: 'DM Sans', sans-serif; font-size: 14px; color: #e8e8e0; outline: none; transition: border-color 0.15s; }
  .delete-input:focus { border-color: #f87171; }
  .delete-input::placeholder { color: #2e2e2e; }
  .delete-btn { background: transparent; border: 0.5px solid #2a1a1a; border-radius: 8px; padding: 10px 16px; font-family: 'DM Sans', sans-serif; font-size: 13px; color: #633; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
  .delete-btn:hover { border-color: #f87171; color: #f87171; background: rgba(248,113,113,0.05); }
  .delete-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .reset-btn { width: 100%; background: transparent; border: 0.5px solid #1e1e1e; border-radius: 10px; padding: 13px; font-family: 'DM Sans', sans-serif; font-size: 13px; color: #3a3a3a; cursor: pointer; transition: all 0.15s; margin-bottom: 16px; }
  .reset-btn:hover { border-color: #2e2e2e; color: #555; }
  .reset-btn.active { border-color: rgba(74,222,128,0.3); color: #4ade80; }
  .status { text-align: center; font-size: 13px; color: #333; padding: 8px; min-height: 28px; transition: all 0.2s; letter-spacing: 0.02em; }
  .status.success { color: #4ade80; }
  .status.error { color: #f87171; }
  .status.loading { color: #888; }
</style>
</head>
<body>
<div class="panel">

  <div class="logo-row">
    <div class="logo-mark">EG</div>
    <div class="logo-text">EG AI</div>
  </div>

  <div class="badge"><span class="badge-dot"></span> Internal Test Panel</div>

  <h1>Lead Test Panel</h1>
  <p class="subtitle">Create a test lead in GHL, trigger the AI SMS workflow, then reset when done.</p>

  <div class="card">
    <div class="section-label">Contact Info</div>
    <div class="field-row">
      <div class="field">
        <label>First Name</label>
        <input type="text" id="firstName" value="TEST" placeholder="First name" />
      </div>
      <div class="field">
        <label>Last Name</label>
        <input type="text" id="lastName" value="Lead" placeholder="Last name" />
      </div>
    </div>
    <div class="field">
      <label>Phone Number</label>
      <input type="tel" id="phone" placeholder="+1 (000) 000-0000" />
    </div>
  </div>

  <div class="card">
    <div class="section-label">Campaign</div>
    <div class="campaigns-grid">
      <button class="campaign-btn" data-campaign="solardemoai" onclick="selectCampaign(this)">
        <span class="campaign-dot"></span>Solar<span class="campaign-tag">B2C</span>
      </button>
      <button class="campaign-btn" data-campaign="hvac companies" onclick="selectCampaign(this)">
        <span class="campaign-dot"></span>HVAC<span class="campaign-tag">B2B</span>
      </button>
      <button class="campaign-btn" data-campaign="roofing companies" onclick="selectCampaign(this)">
        <span class="campaign-dot"></span>Roofing<span class="campaign-tag">B2B</span>
      </button>
      <button class="campaign-btn" data-campaign="water ai english" onclick="selectCampaign(this)">
        <span class="campaign-dot"></span>Water (EN)<span class="campaign-tag">B2C</span>
      </button>
      <button class="campaign-btn" data-campaign="water ai spanish" onclick="selectCampaign(this)">
        <span class="campaign-dot"></span>Water (ES)<span class="campaign-tag">B2C</span>
      </button>
      <button class="campaign-btn" data-campaign="" onclick="selectCampaign(this)">
        <span class="campaign-dot"></span>No Campaign<span class="campaign-tag">F</span>
      </button>
    </div>
    <div class="selected-display" id="selectedDisplay">
      <span>Tag:</span>
      <strong id="selectedTag"></strong>
    </div>
  </div>

  <button class="submit-btn" id="submitBtn" onclick="createLead()">Create &amp; Trigger Workflow</button>

  <div class="divider">
    <div class="divider-line"></div>
    <div class="divider-text">Reset</div>
    <div class="divider-line"></div>
  </div>

  <div class="card">
    <div class="section-label">Delete contact by phone</div>
    <div class="delete-row">
      <input type="tel" class="delete-input" id="deletePhone" placeholder="+1 (000) 000-0000" />
      <button class="delete-btn" id="deleteBtn" onclick="deleteByPhone()">Find &amp; Delete</button>
    </div>
  </div>

  <button class="reset-btn" id="resetBtn" onclick="resetContact()">Delete Last Created Contact</button>
  <div class="status" id="status">Ready to test</div>

</div>

<script>
  const API_KEY = 'pit-d8a210f2-0115-42c3-b7d2-cb2bc132da3a';
  const LOCATION_ID = 'iEWbFDsVXA7RgYBw5nbH';
  const BASE_URL = 'https://services.leadconnectorhq.com';
  let selectedCampaign = null;
  let createdContactId = null;

  function selectCampaign(btn) {
    document.querySelectorAll('.campaign-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    selectedCampaign = btn.dataset.campaign;
    const tag = document.getElementById('selectedTag');
    tag.textContent = selectedCampaign === '' ? '(none — Flow F)' : selectedCampaign;
    document.getElementById('selectedDisplay').classList.add('visible');
  }

  function setStatus(msg, type = '') {
    const el = document.getElementById('status');
    el.textContent = msg;
    el.className = 'status ' + type;
  }

  async function createLead() {
    const firstName = document.getElementById('firstName').value.trim();
    const lastName = document.getElementById('lastName').value.trim();
    const phone = document.getElementById('phone').value.trim();
    if (!phone) { setStatus('Phone number is required', 'error'); return; }

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    setStatus('Creating contact...', 'loading');

    try {
      const tags = selectedCampaign ? [selectedCampaign] : [];
      const res = await fetch(`${BASE_URL}/contacts/`, {
        method: 'POST',
        headers: {
          'Authorization': `Bearer ${API_KEY}`,
          'Version': '2021-07-28',
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ firstName, lastName, phone, locationId: LOCATION_ID, tags })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.message || JSON.stringify(data));
      createdContactId = data.contact?.id;
      const label = selectedCampaign || 'No Campaign (Flow F)';
      setStatus(`Contact created — tag: "${label}"`, 'success');
      document.getElementById('resetBtn').classList.add('active');
      document.getElementById('deletePhone').value = phone;
    } catch (err) {
      setStatus('Error: ' + err.message, 'error');
      btn.disabled = false;
    }
  }

  async function deleteContact(contactId) {
    const res = await fetch(`${BASE_URL}/contacts/${contactId}`, {
      method: 'DELETE',
      headers: { 'Authorization': `Bearer ${API_KEY}`, 'Version': '2021-07-28' }
    });
    if (!res.ok) throw new Error('Delete failed');
  }

  async function resetContact() {
    if (!createdContactId) { setStatus('No contact from this session to delete', 'error'); return; }
    setStatus('Deleting contact...', 'loading');
    try {
      await deleteContact(createdContactId);
      createdContactId = null;
      document.getElementById('submitBtn').disabled = false;
      document.getElementById('phone').value = '';
      document.getElementById('deletePhone').value = '';
      document.querySelectorAll('.campaign-btn').forEach(b => b.classList.remove('selected'));
      document.getElementById('selectedDisplay').classList.remove('visible');
      document.getElementById('resetBtn').classList.remove('active');
      selectedCampaign = null;
      setStatus('Contact deleted. Ready to test again.', 'success');
      setTimeout(() => setStatus('Ready to test'), 3000);
    } catch (err) {
      setStatus('Error: ' + err.message, 'error');
    }
  }

  async function deleteByPhone() {
    const phone = document.getElementById('deletePhone').value.trim();
    if (!phone) { setStatus('Enter a phone number to search', 'error'); return; }

    const btn = document.getElementById('deleteBtn');
    btn.disabled = true;
    setStatus('Searching for contact...', 'loading');

    try {
      const encoded = encodeURIComponent(phone);
      const res = await fetch(`${BASE_URL}/contacts/?locationId=${LOCATION_ID}&query=${encoded}`, {
        headers: { 'Authorization': `Bearer ${API_KEY}`, 'Version': '2021-07-28' }
      });
      const data = await res.json();
      const contacts = data.contacts || [];

      if (contacts.length === 0) {
        setStatus('No contact found with that phone number', 'error');
        btn.disabled = false;
        return;
      }

      let deleted = 0;
      for (const contact of contacts) {
        await deleteContact(contact.id);
        deleted++;
      }

      if (createdContactId && contacts.find(c => c.id === createdContactId)) {
        createdContactId = null;
        document.getElementById('submitBtn').disabled = false;
        document.getElementById('resetBtn').classList.remove('active');
      }

      document.getElementById('deletePhone').value = '';
      selectedCampaign = null;
      document.querySelectorAll('.campaign-btn').forEach(b => b.classList.remove('selected'));
      document.getElementById('selectedDisplay').classList.remove('visible');

      setStatus(`${deleted} contact${deleted > 1 ? 's' : ''} deleted. Ready to test again.`, 'success');
      setTimeout(() => setStatus('Ready to test'), 3000);

    } catch (err) {
      setStatus('Error: ' + err.message, 'error');
    } finally {
      btn.disabled = false;
    }
  }
</script>
</body>
</html>
